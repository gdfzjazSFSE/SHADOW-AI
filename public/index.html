<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadowAI - Build anything with AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #1a0a0a;
    }

    /* ANIMATED BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, #8B3A2A 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #6B2D1A 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, #3D1A0A 0%, transparent 50%),
        linear-gradient(135deg, #2D1008 0%, #1A0A05 40%, #0D0500 100%);
      z-index: 0;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo span {
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #000;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: color 0.2s;
      cursor: pointer;
    }

    .nav-links a:hover { color: #fff; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-signin {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-demo {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }

    .btn-demo:hover { opacity: 0.9; }

    /* HERO */
    #landing {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 16px;
      border-radius: 100px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      margin-bottom: 32px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .badge:hover { background: rgba(255,255,255,0.15); }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 8vw, 88px);
      color: #fff;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    h1 em {
      font-style: italic;
      color: rgba(255,255,255,0.85);
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }

    /* INPUT BOX */
    .input-container {
      width: 100%;
      max-width: 680px;
      background: rgba(0,0,0,0.75);
      border-radius: 16px;
      padding: 20px 20px 16px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .input-container textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 60px;
      max-height: 120px;
      line-height: 1.6;
    }

    .input-container textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .input-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .input-tags {
      display: flex;
      gap: 8px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .tag:hover { background: rgba(255,255,255,0.12); }

    .send-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:hover { background: #fff; transform: scale(1.05); }

    .send-btn svg { width: 16px; height: 16px; }

    /* CHAT PAGE */
    #chat-page {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #f9f9f8;
    }

    .chat-layout {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #f0ede8;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .sidebar-logo span { color: #d97706; }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #d5d0c8;
      background: #fff;
      color: #1a1a1a;
      margin-bottom: 16px;
      transition: background 0.2s;
    }

    .new-chat-btn:hover { background: #f5f2ed; }

    .sidebar-section {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.5px;
      padding: 0 12px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .chat-history-item {
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }

    .chat-history-item:hover { background: #e8e4de; color: #1a1a1a; }

    .sidebar-bottom {
      margin-top: auto;
      border-top: 1px solid #e0dbd2;
      padding-top: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .user-email { font-size: 11px; color: #999; }

    /* MAIN CHAT */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #ece9e4;
      background: #f9f9f8;
    }

    .model-label {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message-row {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
    }

    .message-row.user { align-items: flex-end; }
    .message-row.bot { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.7;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      border: 1px solid #ece9e4;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      font-family: 'EB Garamond', serif;
      font-size: 16px;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #ece9e4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 6px; height: 6px;
      background: #ccc;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); background: #d97706; }
    }

    .chat-input-wrapper {
      padding: 16px 24px 24px;
      background: #f9f9f8;
      border-top: 1px solid #ece9e4;
    }

    .chat-input-box {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .chat-input-box:focus-within { border-color: #d97706; }

    .chat-input-box textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      line-height: 1.6;
      background: transparent;
      color: #1a1a1a;
    }

    .chat-input-box textarea::placeholder { color: #bbb; }

    .chat-send-btn {
      width: 36px; height: 36px;
      background: #1a1a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .chat-send-btn:hover { background: #333; }

    .chat-send-btn svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- LANDING PAGE -->
<div id="landing">
  <nav>
    <div class="nav-logo">
      <span>⚡</span> ShadowAI
    </div>
    <div class="nav-links">
      <a>Pricing</a>
      <a>About</a>
      <a>Discord</a>
    </div>
    <div class="nav-right">
      <button class="btn-signin" onclick="showChat()">Sign in</button>
      <button class="btn-demo" onclick="showChat()">Try the demo</button>
    </div>
  </nav>

  <div class="badge">✨ Introducing ShadowAI 2.0 →</div>

  <h1>Ask anything<br><em>Get answers. Build ideas.</em></h1>
  <p class="subtitle">Intelligent. Fast. Your AI assistant.</p>

  <div class="input-container">
    <textarea id="landingInput" placeholder="Ask me anything..." rows="2"
      onkeydown="handleLandingKey(event)"></textarea>
    <div class="input-bottom">
      <div class="input-tags">
        <div class="tag">⚡ Fast</div>
        <div class="tag">🧠 Smart</div>
        <div class="tag">🔗 Free</div>
      </div>
      <button class="send-btn" onclick="startFromLanding()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- CHAT PAGE -->
<div id="chat-page">
  <div class="chat-layout">
    <div class="sidebar">
      <div class="sidebar-logo">Shadow<span>AI</span></div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
      <div class="sidebar-section">Recent</div>
      <div id="history-list"></div>
      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="avatar" id="user-avatar">U</div>
          <div>
            <div class="user-name" id="user-name-display">User</div>
            <div class="user-email" id="user-email-display">shadowai.vercel.app</div>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-main">
      <div class="topbar">
        <div class="model-label">ShadowAI ▾</div>
      </div>
      <div class="chat-area" id="chatArea"></div>
      <div class="chat-input-wrapper">
        <div class="chat-input-box">
          <textarea id="chatInput" placeholder="Message ShadowAI..." rows="1"
            onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
          <button class="chat-send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
        <div class="input-hint">ShadowAI can make mistakes. Verify important info.</div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  function showChat() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('chat-page').style.display = 'block';
  }

  function startFromLanding() {
    var msg = document.getElementById('landingInput').value.trim();
    showChat();
    if (msg) {
      setTimeout(() => {
        document.getElementById('chatInput').value = msg;
        sendMessage();
      }, 100);
    }
  }

  function handleLandingKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      startFromLanding();
    }
  }

  function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function newChat() {
    document.getElementById('chatArea').innerHTML = '';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }
</script>
</body>
</html>
