<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadowAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f9f9f8;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* LOGIN PAGE */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fff;
    }
    .login-box {
      width: 380px;
      padding: 48px 40px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e5;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .login-logo {
      font-size: 32px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .login-logo span { color: #d97706; }
    .login-tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border 0.2s;
      background: #fafafa;
    }
    .login-box input:focus { border-color: #d97706; background: #fff; }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .login-btn:hover { background: #333; }
    .login-divider {
      font-size: 12px;
      color: #bbb;
      margin: 16px 0;
    }
    .login-google {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #333;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-google:hover { background: #f5f5f5; }
    .login-footer {
      font-size: 12px;
      color: #aaa;
      margin-top: 24px;
    }
    .login-footer a { color: #888; text-decoration: underline; cursor: pointer; }

    /* MAIN CHAT PAGE */
    #chat-page { display: none; flex-direction: column; height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: #f0ede8;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      z-index: 10;
    }
    .sidebar-logo {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      padding: 8px 12px;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .sidebar-logo span { color: #d97706; }
    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #d5d0c8;
      background: #fff;
      color: #1a1a1a;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: #f5f2ed; }
    .sidebar-section {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.5px;
      padding: 0 12px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .chat-history-item {
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }
    .chat-history-item:hover { background: #e8e4de; color: #1a1a1a; }
    .sidebar-bottom {
      margin-top: auto;
      border-top: 1px solid #e0dbd2;
      padding-top: 12px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .user-info:hover { background: #e8e4de; }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .user-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .user-email { font-size: 11px; color: #999; }

    /* MAIN CONTENT */
    .main {
      margin-left: 260px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #ece9e4;
      background: #f9f9f8;
    }
    .model-select {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .model-select:hover { background: #ece9e4; }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .welcome {
      text-align: center;
      padding: 80px 24px 40px;
    }
    .welcome h2 {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .welcome p { font-size: 15px; color: #888; }

    .message-row {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
    }
    .message-row.user { align-items: flex-end; }
    .message-row.bot { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.7;
      word-wrap: break-word;
    }
    .bubble.user {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
      font-weight: 400;
    }
    .bubble.bot {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      border: 1px solid #ece9e4;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* THINKING ANIMATION */
    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #ece9e4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      width: fit-content;
    }
    .thinking span {
      font-size: 13px;
      color: #999;
      font-style: italic;
    }
    .dot {
      width: 6px; height: 6px;
      background: #ccc;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); background: #d97706; }
    }

    /* INPUT AREA */
    .input-wrapper {
      padding: 16px 24px 24px;
      background: #f9f9f8;
      border-top: 1px solid #ece9e4;
    }
    .input-box {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: border 0.2s;
    }
    .input-box:focus-within { border-color: #d97706; }
    .input-box textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      line-height: 1.6;
      background: transparent;
      color: #1a1a1a;
    }
    .input-box textarea::placeholder { color: #bbb; }
    .send-btn {
      width: 36px; height: 36px;
      background: #1a1a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #333; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">Shadow<span>AI</span></div>
    <div class="login-tagline">Your intelligent AI assistant</div>
    <input type="text" id="login-name" placeholder="Your name" />
    <input type="email" id="login-email" placeholder="Email address" />
    <input type="password" id="login-password" placeholder="Password" />
    <button class="login-btn" onclick="doLogin()">Continue</button>
    <div class="login-divider">or</div>
    <button class="login-google" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="login-footer">
      By continuing you agree to our <a>Terms</a> and <a>Privacy Policy</a>
    </div>
  </div>
</div>

<!-- CHAT PAGE -->
<div id="chat-page">
  <div class="sidebar">
    <div class="sidebar-logo">Shadow<span>AI</span></div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
    <div class="sidebar-section">Recent</div>
    <div id="history-list"></div>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar" id="user-avatar">U</div>
        <div>
          <div class="user-name" id="user-name-display">User</div>
          <div class="user-email" id="user-email-display">user@email.com</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="model-select">
        ShadowAI ▾
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome-msg">
        <h2>Good to see you! 👋</h2>
        <p>Ask me anything — I'm here to help.</p>
      </div>
    </div>

    <div class="input-wrapper">
      <div class="input-box">
        <textarea id="userInput" placeholder="Message ShadowAI..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="input-hint">ShadowAI can make mistakes. Verify important info.</div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  function doLogin() {
    const name = document.getElementById('login-name').value || 'User';
    const email = document.getElementById('login-email').value || 'user@email.com';
    document.getElementById('user-name-display').textContent = name;
    document.getElementById('user-email-display').textContent = email;
    document.getElementById('user-avatar').textContent = name[0].toUpperCase();
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('chat-page').style.display = 'flex';
    document.getElementById('welcome-msg').querySelector('h2').textContent = `Good to see you, ${name.split(' ')[0]}! 👋`;
  }

  function newChat() {
    document.getElementById('chatArea').innerHTML = `
      <div class="welcome" id="welcome-msg">
        <h2>What can I help with?</h2>
        <p>Ask me anything — I'm here to help.</p>
      </div>`;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }
</script>
</body>
</html>
